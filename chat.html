<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .container_background {
            
            background-image: url('https://wallpapercave.com/wp/wp6475241.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            padding: 20px;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 10px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            font-size: 24px;
        }

        .navbar form {
            display: flex;
            align-items: center;
        }

        .navbar select, .navbar input, .navbar button {
            margin: 0 5px;
            padding: 5px;
        }
        

        .musicAlbum {
            display: flex;
            flex-wrap: wrap;
            margin-top: 2%;
            margin-left:10%;
            margin-right: 10%;
        }

        .card {
            background: rgba(255, 255, 255, 0.995);
            margin: 10px;
            width: 200px;
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px, rgb(51, 51, 51) 0px 0px 0px 4px;
            color: black; 
        }

        img {
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px, rgb(51, 51, 51) 0px 0px 0px 4px;

            width: 100%;
        }

        .card-body {
            padding: 10px;
            text-align: center;
        }

        .player-container {
            
            position: fixed;
            bottom: 0;
            width: 80%;
            display: flex;
            align-items: center;
            margin-left: 12%;
            margin-bottom: 1%;
        }

        .player-container img {
            width: 50px;
            margin-right: 20px;
            border: 5px solid #ffffff;
            border-radius: 4px;
        }

        .player-container audio {
            width: 80%;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Factory</title>
</head>
<body>

    <nav class="navbar">
        <a href="#">MusicFactory</a>
        <form id="searchForm">
            <select id="options">
                <option value="tracks">tracks</option>
                <option value="albums">albums</option>
                <option value="podcasts">podcasts</option>
                <option value="multi">multi</option>
            </select>
            <input type="search" id="query" placeholder="Search">
            <button type="submit">Search</button>
        </form>
    </nav>

    <div class="container_background">
        <div class="musicAlbum"></div>
    </div>

    <div class="player-container">
        <img src="https://cdn-icons-png.flaticon.com/512/16695/16695368.png" id="player-image" alt="">
        <audio controls id="player"></audio>
    </div>

    <script > 
        document.addEventListener('DOMContentLoaded', async (event) => {
    const url = 'https://spotify23.p.rapidapi.com/search/?q=haryanvi&type=multi&offset=0&limit=100&numberOfTopResults=50';
    const options = {
        method: 'GET',
        headers: {
            'x-rapidapi-key': '60559c5a31msh6988ab81089220cp1eb108jsn07f5201babb7',
            'x-rapidapi-host': 'spotify23.p.rapidapi.com'
        }
    };

    try {
        const response = await fetch(url, options);
        const result = await response.json();
        console.log(result);

        let content = "";
        result.tracks.items.map((element, index) => {
            content += `
                <div class="card" onclick="playTrack('${element.data.id}')">
                    <img src="${element.data.albumOfTrack.coverArt.sources[0].url}" alt="Album Art">
                    <div class="card-body">
                        <p>${element.data.albumOfTrack.name}</p>
                    </div>
                </div>
            `;
        });

        document.querySelector('.musicAlbum').innerHTML = content;
    } catch (error) {
        console.error(error);
    }
});

document.getElementById('searchForm').addEventListener('submit', async (event) => {
    event.preventDefault();

    let query = document.getElementById('query').value;
    let selectedOption = document.getElementById('options').value;

    const url = `https://spotify23.p.rapidapi.com/search/?q=${query}&type=${selectedOption}&offset=0&limit=100&numberOfTopResults=50`;
    const options = {
        method: 'GET',
        headers: {
            'x-rapidapi-key': '60559c5a31msh6988ab81089220cp1eb108jsn07f5201babb7',
            'x-rapidapi-host': 'spotify23.p.rapidapi.com'
        }
    };

    try {
        const response = await fetch(url, options);
        const result = await response.json();
        console.log(result);

        let content = "";
        result.tracks.items.map((element, index) => {
            content += `
                <div class="card" onclick="playTrack('${element.data.id}')">
                    <img src="${element.data.albumOfTrack.coverArt.sources[0].url}" alt="Album Art">
                    <div class="card-body">
                        <h6>${element.data.albumOfTrack.name}</h6>
                    </div>
                </div>
            `;
        });

        document.querySelector('.musicAlbum').innerHTML = content;
    } catch (error) {
        console.error(error);
    }
});

async function playTrack(songId) {
    const url = `https://spotify23.p.rapidapi.com/tracks/?ids=${songId}`;
    const options = {
        method: 'GET',
        headers: {
            'x-rapidapi-key': '60559c5a31msh6988ab81089220cp1eb108jsn07f5201babb7',
            'x-rapidapi-host': 'spotify23.p.rapidapi.com'
        }
    };

    try {
        const response = await fetch(url, options);
        const result = await response.json();
        if (result.tracks && result.tracks.length > 0) {
            const previewUrl = result.tracks[0].preview_url;
            const img = result.tracks[0].album.images[0].url;

            if (previewUrl) {
                document.getElementById('player-image').src = img;
                document.getElementById('player').src = previewUrl;
                document.getElementById('player').play();
            } else {
                console.error('Preview URL not available.');
            }
        } else {
            console.error('Track not found.');
        }
    } catch (error) {
        console.error(error);
    }
}

    </script>
</body>
</html>
