<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .container_background{
            background-image: url('https://wallpapercave.com/wp/wp6475241.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: 100% 100%;

        }

        #player{
            margin-left: 25%; width: 50vw; color:rgba(0, 0, 0, 0.221);
            
        }
        .card{
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px, rgb(51, 51, 51) 0px 0px 0px 4px;

            width: 14vw;
        }

        #card-img{
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px, rgb(51, 51, 51) 0px 0px 0px 4px;
        }
        .navbar-toggler-icon {
            background-color: rgb(255, 255, 255); /* Set your desired color here */
        }

       
        #player-image{
                width: 50px; 
                margin-left: 21%;
                border: 5px solid #ffffff;
                border-radius: 4px;
        }

        #player-audio{
            width: 50vw;
        }


        

    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/16820/16820933.png" width="256" height="256" type="image/x-icon">
    <title>music Factory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <nav id ="navbar" class="navbar navbar-expand-lg navbar-light bg-dark text-white fixed-top">
        <div class="container-fluid ">
          <a class="navbar-brand h1 text-white" href="#">MusicFactory</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon rounded"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            </ul>
            <form class="d-flex" role="search">
                
                    <select name="options" id="options" class="m-1 rounded">
                        <option value="tracks">tracks</option>
                        <option value="albums">albums</option>
                        <option value="podcasts">podcasts</option>
                        <option value="multi">multi</option>
                      </select>
                  
              <input class="form-control me-2 Makequery" id="query" type="search" placeholder="Search" aria-label="Search">
              <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
          </div>
        </div>
    </nav>

    <br><br>

    

    <div class="container_background ">
    <div class="container musicAlbum d-flex flex-wrap overflow-y-hidden">
        <!-- MISIC ALBUM -->
    </div>
    </div>

    <div class="shadow d-flex"  >
        <img src="https://cdn-icons-png.flaticon.com/512/16695/16695368.png" class="fixed-bottom mb-4  shadow"id="player-image" alt="">
        <audio controls src="" id="player" class="fixed-bottom mb-4  shadow"  ></audio>
    </div>

    <script src="musicFactory.js" ></script>
    
</body>
</html>
