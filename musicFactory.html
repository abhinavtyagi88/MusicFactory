<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .container_background{
            background-image: url('https://wallpapercave.com/wp/wp6475241.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: 100% 100%;

        }

        #player{
            margin-left: 25%; width: 50vw; color:rgba(0, 0, 0, 0.221);
            
        }
        .card{
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px, rgb(51, 51, 51) 0px 0px 0px 4px;

            width: 14vw;
        }

        #card-img{
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px, rgb(51, 51, 51) 0px 0px 0px 4px;
        }
        .navbar-toggler-icon {
            background-color: rgb(255, 255, 255); /* Set your desired color here */
        }

       
        #player-image{
                width: 50px; 
                margin-left: 21%;
                border: 5px solid #ffffff;
                border-radius: 4px;
        }

        #player-audio{
            width: 50vw;
        }


        

    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/16820/16820933.png" width="256" height="256" type="image/x-icon">
    <title>music Factory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <nav id ="navbar" class="navbar navbar-expand-lg navbar-light bg-dark text-white fixed-top">
        <div class="container-fluid ">
          <a class="navbar-brand h1 text-white" href="#">MusicFactory</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon rounded"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            </ul>
            <form class="d-flex" role="search">
                
                    <select name="options" id="options" class="m-1 rounded">
                        <option value="tracks">tracks</option>
                        <option value="albums">albums</option>
                        <option value="podcasts">podcasts</option>
                        <option value="multi">multi</option>
                      </select>
                  
              <input class="form-control me-2 Makequery" id="query" type="search" placeholder="Search" aria-label="Search">
              <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
          </div>
        </div>
    </nav>

    <br><br>

    

    <div class="container_background ">
    <div class="container musicAlbum d-flex flex-wrap overflow-y-hidden">
        <!-- MISIC ALBUM -->
    </div>
    </div>

    <div class="shadow d-flex"  >
        <img src="https://cdn-icons-png.flaticon.com/512/16695/16695368.png" class="fixed-bottom mb-4  shadow"id="player-image" alt="">
        <audio controls src="" id="player" class="fixed-bottom mb-4  shadow"  ></audio>
    </div>

    <script >
        document.addEventListener('DOMContentLoaded', async (event) => {
            
            const url = 'https://spotify23.p.rapidapi.com/search/?q=haryanvi&type=multi&offset=0&limit=100&numberOfTopResults=50';
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '60559c5a31msh6988ab81089220cp1eb108jsn07f5201babb7',
                    'x-rapidapi-host': 'spotify23.p.rapidapi.com'
                }
            };
        
            try {
                const response = await fetch(url, options);
                const result = await response.json();
                console.log(result);
        
                let content = "";
                result.tracks.items.map((element, index) => {
                    const card = document.createElement("div");
                    content += `
                            <div class="card m-3"  onclick="playTrack('${element.data.id}')">
                                <img id='card-img' src="${element.data.albumOfTrack.coverArt.sources[0].url}" class="card-img-top"  alt="...">
                                <div class="card-body">
                                    <p class="card-text h6">${element.data.albumOfTrack.name}</p>
                                </div>
                            </div>
                    `;
                });
        
                document.querySelector('.musicAlbum').innerHTML = content;
        
            } catch (error) {
                console.error(error);
            }
        });
        
        // search Functionality
        document.addEventListener('submit', async (event) => {
            event.preventDefault();
        
            let query = document.getElementById('query').value;
            let selectedOption = document.getElementById('options').value;
            console.log("Query:",query,"\nselectedOption:",selectedOption);
            
        
            const url = `https://spotify23.p.rapidapi.com/search/?q=${query}&type=${selectedOption}&offset=0&limit=100&numberOfTopResults=50`;
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '60559c5a31msh6988ab81089220cp1eb108jsn07f5201babb7',
                    'x-rapidapi-host': 'spotify23.p.rapidapi.com'
                }
            };
        
            try {
                const response = await fetch(url, options);
                const result = await response.json();
                console.log(result);
        
                let content = "";
                result.tracks.items.map((element, index) => {
                    const card = document.createElement("div");
                    content += `
                            <div class="card m-3"  onclick="playTrack('${element.data.id}')">
                                <img src="${element.data.albumOfTrack.coverArt.sources[0].url}" class="card-img-top"  alt="...">
                                <div class="card-body">
                                    <p class="card-text">${element.data.albumOfTrack.name}</p>
                                </div>
                            </div>
                    `;
                });
        
                document.querySelector('.musicAlbum').innerHTML = content;
        
            } catch (error) {
                console.error(error);
            }
        });
        
        
        // function called on click
        async function playTrack(songId) {
            console.log(songId);
            const url = `https://spotify23.p.rapidapi.com/tracks/?ids=${songId}`;
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '60559c5a31msh6988ab81089220cp1eb108jsn07f5201babb7',
                    'x-rapidapi-host': 'spotify23.p.rapidapi.com'
                }
            };
        
            try {
                const response = await fetch(url, options)
                const result = await response.json()
                console.log(result);
                if (result.tracks && result.tracks.length > 0) {
                    const previewUrl = result.tracks[0].preview_url
                    const img = result.tracks[0].album.images[0].url
        
                    console.log(img);
        
        
                    if (previewUrl) {
                        let playerImg = document.getElementById('player-image')
                        let player = document.getElementById('player')
                        player.src = previewUrl
                        playerImg.src = img 
        
                        player.play()
        
        
                    } else {
                        console.error('Preview URL not available.')
                    }
                } else {
                    console.error('Track not found.')
                }
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>
</html>
